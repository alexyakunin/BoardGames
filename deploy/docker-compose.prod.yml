# Production stack for BoardGames on the shared VM (Oracle Cloud A1) behind
# Cloudflare. Brings up:
#   boardgames-app -> boardgames.actuallab.net (routed by the shared edge Caddy)
#   boardgames-db  -> PostgreSQL, reachable only from boardgames-app
#
# TLS + routing are handled by the shared edge Caddy, which lives in
# ActualLab/DeployConfigs (oracle-vm1/edge) and owns ports 80/443 on this host.
# This stack publishes no ports; the app joins the external "edge" network and is
# reached by its container name (see that repo's Caddyfile:
# `boardgames.actuallab.net -> boardgames-app:8080`). The DB sits on a stack-private
# network and is not reachable from outside.
#
# Data is persisted on the host in /var/lib/boardgames/postgres.
#
# Usage on the host:
#   cd deploy && docker compose -f docker-compose.prod.yml up -d --build
#
# Configuration is read from deploy/.env (see .env.example).
name: boardgames

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: app_release
    container_name: boardgames-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      # Caddy terminates TLS, so the app runs behind an HTTPS proxy
      BoardGames__AssumeHttps: "true"
      BoardGames__UseForwardedHeaders: "true"
      BoardGames__UsePostgreSql: "Server=db;Database=boardgames;Port=5432;User Id=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      # OAuth: defaults are the repo's public demo credentials (same as HostSettings.cs),
      # so leaving them unset is valid. Override in .env for a real deployment, and make
      # sure the OAuth apps list https://boardgames.actuallab.net/signin-github & /signin-microsoft as callbacks.
      BoardGames__GitHubClientId: "${BOARDGAMES_GITHUBCLIENTID:-Iv23liclgDFiYO8LJoHM}"
      BoardGames__GitHubClientSecret: "${BOARDGAMES_GITHUBCLIENTSECRET:-fdbae91e208663689f2c519b424f6bee46260ee7}"
      BoardGames__MicrosoftClientId: "${BOARDGAMES_MICROSOFTCLIENTID:-6839dbf7-d1d3-4eb2-a7e1-ce8d48f34d00}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - edge
      - internal

  db:
    image: postgres:17
    container_name: boardgames-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "boardgames"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    volumes:
      # Bind mount (explicit, easy to back up, immune to `docker volume prune`)
      # at the FHS-correct service-state location. postgres:17 keeps PGDATA
      # under /var/lib/postgresql/data.
      - /var/lib/boardgames/postgres:/var/lib/postgresql/data
    entrypoint: ["docker-entrypoint.sh", "-c", "shared_buffers=256MB", "-c", "max_connections=1000"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - internal

networks:
  # The shared edge network (created once on the host; the edge Caddy from
  # ActualLab/DeployConfigs lives here and routes boardgames.actuallab.net here).
  edge:
    external: true
    name: edge
  # Stack-private network the DB lives on; not reachable from outside.
  internal:
